openapi: 3.1.0
info:
  title: OpenCord Server API
  version: 0.0.0-dev
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Server is healthy
  /ws:
    get:
      summary: WebSocket realtime gateway
      description: >
        Upgrades to a WebSocket connection. Browser clients may pass the bearer
        session token as a `token` query parameter. The gateway emits realtime
        event envelopes such as `message.created`, `typing.started`, and
        `typing.stopped`.
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
      responses:
        "101":
          description: WebSocket protocol switch
        "401":
          description: Missing or invalid bearer session
  /.well-known/opencord:
    get:
      summary: OpenCord server discovery metadata
      responses:
        "200":
          description: Discovery metadata
  /api/version:
    get:
      summary: Server version
      responses:
        "200":
          description: Version metadata
  /api/capabilities:
    get:
      summary: Server capabilities
      responses:
        "200":
          description: Capability list
  /auth/register:
    post:
      summary: Register a user and create a bearer session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already registered
  /auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
  /auth/logout:
    post:
      summary: Revoke the current bearer session
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          description: Missing or invalid bearer session
  /me:
    get:
      summary: Return the current bearer session user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid bearer session
  /push-tokens:
    post:
      summary: Register or update a device push token
      description: >
        Registers a push notification token for the current user. The response
        intentionally returns only the token suffix; the raw provider token is
        stored for future delivery providers and is never echoed to clients.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushTokenRequest"
      responses:
        "201":
          description: Registered or updated push token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushTokenResourceResponse"
        "400":
          description: Invalid platform, token, or device name
        "401":
          description: Missing or invalid bearer session
    get:
      summary: List push tokens for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registered push tokens for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushTokenListResponse"
        "401":
          description: Missing or invalid bearer session
  /organizations:
    post:
      summary: Create an organization owned by the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Created organization and owner membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "409":
          description: Organization slug already exists
    get:
      summary: List organizations for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizations visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
        "401":
          description: Missing or invalid bearer session
  /organizations/{organization_id}:
    get:
      summary: Return one organization for the current user
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization and membership role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
  /organizations/{organization_id}/spaces:
    post:
      summary: Create a space inside an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpaceRequest"
      responses:
        "201":
          description: Created space and owner membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpaceMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
        "409":
          description: Space slug already exists in this organization
    get:
      summary: List spaces for the current user inside an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Spaces visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpaceListResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
  /spaces/{space_id}/channels:
    post:
      summary: Create a text channel inside a space
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Created channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_CHANNELS permission
        "404":
          description: Space not found for this user
        "409":
          description: Channel slug already exists in this space
    get:
      summary: List text channels inside a space
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Channels visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelListResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Space not found for this user
  /spaces/{space_id}/members:
    post:
      summary: Add a registered user to a space
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSpaceMemberRequest"
      responses:
        "201":
          description: Added or reactivated space member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpaceMemberResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing INVITE_MEMBERS permission
        "404":
          description: Space not found for this user
  /spaces/{space_id}/roles:
    post:
      summary: Create a space role
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Created role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_ROLES permission
        "404":
          description: Space not found for this user
        "409":
          description: Role name already exists in this space
  /spaces/{space_id}/roles/{role_id}/assignments:
    post:
      summary: Assign a space role to a member
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "201":
          description: Assigned role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleAssignmentResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_ROLES permission
        "404":
          description: Space, target member, or role not found
  /spaces/{space_id}/audit-events:
    get:
      summary: List space audit events
      description: >
        Returns admin-visible audit events for moderation and compliance
        actions inside a space. Requires MANAGE_SPACE.
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Space audit events ordered by creation time
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_SPACE permission
        "404":
          description: Space not found for this user
  /channels/{channel_id}:
    patch:
      summary: Update a text channel
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchChannelRequest"
      responses:
        "200":
          description: Updated channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_CHANNELS permission
        "404":
          description: Channel or parent space not found for this user
        "409":
          description: Channel slug already exists in this space
  /channels/{channel_id}/permission-overrides:
    post:
      summary: Set a member or role permission override for a channel
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetChannelPermissionOverrideRequest"
      responses:
        "200":
          description: Upserted channel permission override
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelPermissionOverrideResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_CHANNELS permission
        "404":
          description: Channel or parent space not found for this user
  /channels/{channel_id}/messages:
    post:
      summary: Send a message to a channel
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "201":
          description: Created message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing SEND_MESSAGES permission
        "404":
          description: Channel or parent space not found for this user
    get:
      summary: List messages in a channel
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Messages visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing VIEW_CHANNEL permission
        "404":
          description: Channel or parent space not found for this user
  /attachments/presign:
    post:
      summary: Create a pending attachment and return an upload URL
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignAttachmentRequest"
      responses:
        "201":
          description: Pending attachment and upload directive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentPresignResponse"
        "400":
          description: Invalid attachment metadata
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing SEND_MESSAGES permission
        "404":
          description: Channel or parent space not found for this user
  /attachments/{attachment_id}/content:
    put:
      summary: Upload attachment bytes for a pending attachment
      security:
        - bearerAuth: []
      parameters:
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Uploaded attachment metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentResourceResponse"
        "400":
          description: Upload body does not match the pending attachment
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing SEND_MESSAGES permission
        "404":
          description: Attachment or parent channel not found for this user
    get:
      summary: Download attachment bytes
      security:
        - bearerAuth: []
      parameters:
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attachment content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing VIEW_CHANNEL permission
        "404":
          description: Attachment or parent channel not found for this user
  /messages/{message_id}:
    patch:
      summary: Edit one of the current user's messages
      security:
        - bearerAuth: []
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMessageRequest"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing SEND_MESSAGES or MANAGE_MESSAGES permission
        "404":
          description: Message or parent channel not found for this user
    delete:
      summary: Soft-delete one of the current user's messages
      security:
        - bearerAuth: []
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Message soft-deleted
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing SEND_MESSAGES or MANAGE_MESSAGES permission
        "404":
          description: Message or parent channel not found for this user
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - display_name
        - password
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          minLength: 1
          maxLength: 80
        password:
          type: string
          minLength: 12
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      required:
        - id
        - email
        - display_name
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
    Session:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    AuthResponse:
      type: object
      required:
        - user
        - session
      properties:
        user:
          $ref: "#/components/schemas/User"
        session:
          $ref: "#/components/schemas/Session"
    MeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"
    RegisterPushTokenRequest:
      type: object
      required:
        - platform
        - token
      properties:
        platform:
          type: string
          enum:
            - ios
            - android
            - web
            - desktop
        token:
          type: string
          minLength: 8
          maxLength: 4096
        device_name:
          type: string
          maxLength: 120
    PushToken:
      type: object
      required:
        - id
        - user_id
        - platform
        - token_last_four
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        platform:
          type: string
          enum:
            - ios
            - android
            - web
            - desktop
        token_last_four:
          type: string
        device_name:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PushTokenResourceResponse:
      type: object
      required:
        - push_token
      properties:
        push_token:
          $ref: "#/components/schemas/PushToken"
    PushTokenListResponse:
      type: object
      required:
        - push_tokens
      properties:
        push_tokens:
          type: array
          items:
            $ref: "#/components/schemas/PushToken"
    CreateOrganizationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
    Organization:
      type: object
      required:
        - id
        - slug
        - name
        - role
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - guest
    Membership:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - guest
    OrganizationMembershipResponse:
      type: object
      required:
        - organization
        - membership
      properties:
        organization:
          $ref: "#/components/schemas/Organization"
        membership:
          $ref: "#/components/schemas/Membership"
    OrganizationListResponse:
      type: object
      required:
        - organizations
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/Organization"
    CreateSpaceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
    Space:
      type: object
      required:
        - id
        - organization_id
        - slug
        - name
        - role
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - guest
    SpaceMembershipResponse:
      type: object
      required:
        - space
        - membership
      properties:
        space:
          $ref: "#/components/schemas/Space"
        membership:
          $ref: "#/components/schemas/Membership"
    SpaceListResponse:
      type: object
      required:
        - spaces
      properties:
        spaces:
          type: array
          items:
            $ref: "#/components/schemas/Space"
    AddSpaceMemberRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum:
            - member
            - guest
    SpaceMember:
      type: object
      required:
        - space_id
        - user_id
        - role
        - status
      properties:
        space_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum:
            - owner
            - member
            - guest
        status:
          type: string
          enum:
            - active
    SpaceMemberResourceResponse:
      type: object
      required:
        - member
      properties:
        member:
          $ref: "#/components/schemas/SpaceMember"
    PermissionName:
      type: string
      enum:
        - VIEW_CHANNEL
        - SEND_MESSAGES
        - MANAGE_MESSAGES
        - MANAGE_CHANNELS
        - MANAGE_ROLES
        - INVITE_MEMBERS
        - MANAGE_SPACE
    CreateRoleRequest:
      type: object
      required:
        - name
        - permissions
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        color:
          type:
            - string
            - "null"
          pattern: "^#[0-9a-fA-F]{6}$"
        position:
          type: integer
          minimum: 0
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionName"
    Role:
      type: object
      required:
        - id
        - organization_id
        - space_id
        - name
        - position
        - permissions
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        space_id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type:
            - string
            - "null"
        position:
          type: integer
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionName"
    RoleResourceResponse:
      type: object
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/Role"
    AssignRoleRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
    RoleAssignment:
      type: object
      required:
        - space_id
        - role_id
        - user_id
        - assigned_by_user_id
      properties:
        space_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        assigned_by_user_id:
          type: string
          format: uuid
    RoleAssignmentResourceResponse:
      type: object
      required:
        - assignment
      properties:
        assignment:
          $ref: "#/components/schemas/RoleAssignment"
    SetChannelPermissionOverrideRequest:
      type: object
      required:
        - target_kind
        - target_id
        - allow
        - deny
      properties:
        target_kind:
          type: string
          enum:
            - role
            - member
        target_id:
          type: string
          format: uuid
        allow:
          type: array
          items:
            $ref: "#/components/schemas/PermissionName"
        deny:
          type: array
          items:
