        - id
        - organization_id
        - created_by_user_id
        - title
        - status
        - starts_at
        - ends_at
        - timezone
        - join_slug
        - join_url
        - attendees
        - reminders
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        space_id:
          type:
            - string
            - "null"
          format: uuid
        channel_id:
          type:
            - string
            - "null"
          format: uuid
        created_by_user_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type:
            - string
            - "null"
        status:
          type: string
          enum:
            - scheduled
            - cancelled
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        timezone:
          type: string
        join_slug:
          type: string
        join_url:
          type: string
          format: uri
        cancelled_at:
          type:
            - string
            - "null"
          format: date-time
        attendees:
          type: array
          items:
            $ref: "#/components/schemas/MeetingAttendee"
        reminders:
          type: array
          items:
            $ref: "#/components/schemas/MeetingReminder"
    MeetingAttendee:
      type: object
      required:
        - id
        - meeting_id
        - role
        - response_status
      properties:
        id:
          type: string
          format: uuid
        meeting_id:
          type: string
          format: uuid
        user_id:
          type:
            - string
            - "null"
          format: uuid
        email:
          type:
            - string
            - "null"
          format: email
        display_name:
          type:
            - string
            - "null"
        role:
          type: string
