    CustomDomain:
      type: object
      required:
        - id
        - organization_id
        - hostname
        - verification_token
        - status
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        hostname:
          type: string
        verification_token:
          type: string
        status:
          type: string
          enum:
            - pending_verification
            - active
    CustomDomainResponse:
      type: object
      required:
        - custom_domain
      properties:
        custom_domain:
          $ref: "#/components/schemas/CustomDomain"
    CustomDomainListResponse:
      type: object
      required:
        - custom_domains
      properties:
        custom_domains:
          type: array
          items:
            $ref: "#/components/schemas/CustomDomain"
    CustomDomainTenant:
      type: object
      required:
        - organization_id
        - slug
        - name
        - plan
        - deployment_mode
        - primary_region
        - hostname
      properties:
        organization_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        plan:
          type: string
          enum:
            - free
            - team
            - business
            - enterprise
        deployment_mode:
          type: string
          enum:
            - self_hosted
            - cloud
        primary_region:
          type: string
        hostname:
          type: string
    CustomDomainResolveResponse:
      type: object
      required:
        - tenant
      properties:
        tenant:
          $ref: "#/components/schemas/CustomDomainTenant"
    BillingProviderEventRequest:
