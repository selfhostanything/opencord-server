            - responded
            - expired
        options:
          type: array
          items:
            type: object
        custom_id:
          type: string
          nullable: true
          description: Present for message component interactions.
        component_type:
          type: integer
          nullable: true
          description: Present for message component interactions.
        response_message_id:
          type: string
          format: uuid
          nullable: true
          description: Present after the original interaction response message has been created.
        created_at:
          type: string
          format: date-time
        responded_at:
          type:
            - string
            - "null"
          format: date-time
