openapi: 3.1.0
info:
  title: OpenCord Server API
  version: 0.0.0-dev
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Server is healthy
  /.well-known/opencord:
    get:
      summary: OpenCord server discovery metadata
      responses:
        "200":
          description: Discovery metadata
  /api/version:
    get:
      summary: Server version
      responses:
        "200":
          description: Version metadata
  /api/capabilities:
    get:
      summary: Server capabilities
      responses:
        "200":
          description: Capability list
  /auth/register:
    post:
      summary: Register a user and create a bearer session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already registered
  /auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
  /auth/logout:
    post:
      summary: Revoke the current bearer session
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          description: Missing or invalid bearer session
  /me:
    get:
      summary: Return the current bearer session user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid bearer session
  /organizations:
    post:
      summary: Create an organization owned by the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Created organization and owner membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "409":
          description: Organization slug already exists
    get:
      summary: List organizations for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizations visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
        "401":
          description: Missing or invalid bearer session
  /organizations/{organization_id}:
    get:
      summary: Return one organization for the current user
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization and membership role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
  /organizations/{organization_id}/spaces:
    post:
      summary: Create a space inside an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpaceRequest"
      responses:
        "201":
          description: Created space and owner membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpaceMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
        "409":
          description: Space slug already exists in this organization
    get:
      summary: List spaces for the current user inside an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Spaces visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpaceListResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
  /spaces/{space_id}/channels:
    post:
      summary: Create a text channel inside a space
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Created channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Space not found for this user
        "409":
          description: Channel slug already exists in this space
    get:
      summary: List text channels inside a space
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Channels visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelListResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Space not found for this user
  /channels/{channel_id}:
    patch:
      summary: Update a text channel
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchChannelRequest"
      responses:
        "200":
          description: Updated channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Channel or parent space not found for this user
        "409":
          description: Channel slug already exists in this space
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - display_name
        - password
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          minLength: 1
          maxLength: 80
        password:
          type: string
          minLength: 12
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      required:
        - id
        - email
        - display_name
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
    Session:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    AuthResponse:
      type: object
      required:
        - user
        - session
      properties:
        user:
          $ref: "#/components/schemas/User"
        session:
          $ref: "#/components/schemas/Session"
    MeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"
    CreateOrganizationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
    Organization:
      type: object
      required:
        - id
        - slug
        - name
        - role
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - guest
    Membership:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - guest
    OrganizationMembershipResponse:
      type: object
      required:
        - organization
        - membership
      properties:
        organization:
          $ref: "#/components/schemas/Organization"
        membership:
          $ref: "#/components/schemas/Membership"
    OrganizationListResponse:
      type: object
      required:
        - organizations
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/Organization"
    CreateSpaceRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
    Space:
      type: object
      required:
        - id
        - organization_id
        - slug
        - name
        - role
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - guest
    SpaceMembershipResponse:
      type: object
      required:
        - space
        - membership
      properties:
        space:
          $ref: "#/components/schemas/Space"
        membership:
          $ref: "#/components/schemas/Membership"
    SpaceListResponse:
      type: object
      required:
        - spaces
      properties:
        spaces:
          type: array
          items:
            $ref: "#/components/schemas/Space"
    CreateChannelRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        topic:
          type: string
          maxLength: 1024
        is_private:
          type: boolean
    PatchChannelRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        topic:
          type: string
          maxLength: 1024
        position:
          type: integer
          minimum: 0
        is_private:
          type: boolean
    Channel:
      type: object
      required:
        - id
        - organization_id
        - space_id
        - kind
        - name
        - slug
        - position
        - is_private
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        space_id:
          type: string
          format: uuid
        kind:
          type: string
          enum:
            - text
        name:
          type: string
        slug:
          type: string
        position:
          type: integer
        topic:
          type:
            - string
            - "null"
        is_private:
          type: boolean
    ChannelResourceResponse:
      type: object
      required:
        - channel
      properties:
        channel:
          $ref: "#/components/schemas/Channel"
    ChannelListResponse:
      type: object
      required:
        - channels
      properties:
        channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
