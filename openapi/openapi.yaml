    RichEmbed:
      type: object
      description: >
        Discord-shaped rich embed subset. The server validates supported fields,
        normalizes omitted `type` to `rich`, rejects unsupported keys, and
        enforces the Discord-style aggregate 6000 character text limit.
      additionalProperties: false
      properties:
        title:
          type: string
          maxLength: 256
        type:
          type: string
          enum:
            - rich
        description:
          type: string
          maxLength: 4096
        url:
          type: string
          format: uri
          maxLength: 2048
        timestamp:
          type: string
          format: date-time
        color:
          type: integer
          minimum: 0
          maximum: 16777215
        footer:
          type: object
          additionalProperties: false
          required:
            - text
          properties:
            text:
              type: string
              maxLength: 2048
            icon_url:
              type: string
              format: uri
              maxLength: 2048
        image:
          $ref: "#/components/schemas/RichEmbedMedia"
        thumbnail:
          $ref: "#/components/schemas/RichEmbedMedia"
        author:
          type: object
          additionalProperties: false
          required:
            - name
          properties:
            name:
              type: string
              maxLength: 256
            url:
              type: string
              format: uri
              maxLength: 2048
            icon_url:
              type: string
              format: uri
              maxLength: 2048
        fields:
          type: array
          maxItems: 25
          items:
            type: object
            additionalProperties: false
            required:
              - name
              - value
            properties:
              name:
                type: string
                maxLength: 256
              value:
                type: string
                maxLength: 1024
              inline:
                type: boolean
