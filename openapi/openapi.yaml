openapi: 3.1.0
info:
  title: OpenCord Server API
  version: 0.0.0-dev
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Server is healthy
  /.well-known/opencord:
    get:
      summary: OpenCord server discovery metadata
      responses:
        "200":
          description: Discovery metadata
  /api/version:
    get:
      summary: Server version
      responses:
        "200":
          description: Version metadata
  /api/capabilities:
    get:
      summary: Server capabilities
      responses:
        "200":
          description: Capability list
  /auth/register:
    post:
      summary: Register a user and create a bearer session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already registered
  /auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
  /auth/logout:
    post:
      summary: Revoke the current bearer session
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          description: Missing or invalid bearer session
  /me:
    get:
      summary: Return the current bearer session user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid bearer session
  /organizations:
    post:
      summary: Create an organization owned by the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Created organization and owner membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "409":
          description: Organization slug already exists
    get:
      summary: List organizations for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizations visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
        "401":
          description: Missing or invalid bearer session
  /organizations/{organization_id}:
    get:
      summary: Return one organization for the current user
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization and membership role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - display_name
        - password
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          minLength: 1
          maxLength: 80
        password:
          type: string
          minLength: 12
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      required:
        - id
        - email
        - display_name
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
    Session:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    AuthResponse:
      type: object
      required:
        - user
        - session
      properties:
        user:
          $ref: "#/components/schemas/User"
        session:
          $ref: "#/components/schemas/Session"
    MeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"
    CreateOrganizationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
    Organization:
      type: object
      required:
        - id
        - slug
        - name
        - role
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - guest
    Membership:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - guest
    OrganizationMembershipResponse:
      type: object
      required:
        - organization
        - membership
      properties:
        organization:
          $ref: "#/components/schemas/Organization"
        membership:
          $ref: "#/components/schemas/Membership"
    OrganizationListResponse:
      type: object
      required:
        - organizations
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/Organization"
