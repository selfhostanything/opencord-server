openapi: 3.1.0
info:
  title: OpenCord Server API
  version: 0.0.0-dev
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Server is healthy
  /metrics:
    get:
      summary: Prometheus metrics
      description: >
        Exposes process-local Prometheus text metrics. Phase 03 media metrics
        include voice join successes, voice join failures by reason, and
        process-known voice participant counts by channel.
      responses:
        "200":
          description: Prometheus text exposition
          content:
            text/plain:
              schema:
                type: string
  /ws:
    get:
      summary: WebSocket realtime gateway
      description: >
        Upgrades to a WebSocket connection. Browser clients may pass the bearer
        session token as a `token` query parameter. The gateway emits realtime
        event envelopes such as `message.created`, `typing.started`, and
        `typing.stopped`.
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
      responses:
        "101":
          description: WebSocket protocol switch
        "401":
          description: Missing or invalid bearer session
  /join/{join_slug}:
    get:
      summary: Resolve a stable meeting join URL
      security:
        - bearerAuth: []
      parameters:
        - name: join_slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Meeting resolved from the join URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Meeting not found for this user
  /.well-known/opencord:
    get:
      summary: OpenCord server discovery metadata
      responses:
        "200":
          description: Discovery metadata
  /api/version:
    get:
      summary: Server version
      responses:
        "200":
          description: Version metadata
  /api/capabilities:
    get:
      summary: Server capabilities
      responses:
        "200":
          description: Capability list
  /api/webhooks/{webhook_id}/{webhook_token}:
    post:
      summary: Execute an incoming webhook
      description: >
        Public Discord-style incoming webhook execution endpoint. The path
        token is the webhook credential and is only shown when the webhook is
        created. Execution is rate-limited per webhook bucket.
      parameters:
        - name: webhook_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: webhook_token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteIncomingWebhookRequest"
      responses:
        "201":
          description: Created message authored by the webhook bot user
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
              description: Request limit for the current webhook bucket.
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: Remaining requests in the current window.
            X-RateLimit-Reset:
              schema:
                type: integer
              description: Seconds until the current bucket resets.
            X-RateLimit-Bucket:
              schema:
                type: string
              description: Stable OpenCord rate-limit bucket key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResourceResponse"
        "400":
          description: Invalid webhook message content
        "404":
          description: Webhook not found, disabled, or token invalid
        "429":
          description: Webhook execution rate limit exceeded
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
            X-RateLimit-Remaining:
              schema:
                type: integer
            X-RateLimit-Reset:
              schema:
                type: integer
            X-RateLimit-Bucket:
              schema:
                type: string
            Retry-After:
              schema:
                type: integer
              description: Seconds until retry is allowed.
  /api/compat/discord/v10/users/@me:
    get:
      summary: Get the current Discord-compatible bot user
      description: >
        Compatibility route for bot SDK migrations. Requires
        `Authorization: Bot ocb_...` and returns the authenticated bot user
        using a Discord-shaped user object.
      security:
        - botAuth: []
      responses:
        "200":
          description: Current bot user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatUser"
        "401":
          description: Missing or invalid bot token
        "429":
          $ref: "#/components/responses/CompatRateLimited"
  /api/compat/discord/v10/guilds/{space_id}:
    get:
      summary: Get a Discord-compatible guild
      description: >
        Maps an OpenCord space to a Discord-shaped guild object. The bot user
        must belong to the target space and organization.
      security:
        - botAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Discord-compatible guild object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatGuild"
        "401":
          description: Missing or invalid bot token
        "404":
          description: Space not found for this bot
        "429":
          $ref: "#/components/responses/CompatRateLimited"
  /api/compat/discord/v10/guilds/{space_id}/channels:
    get:
      summary: List Discord-compatible guild channels
      description: >
        Maps visible OpenCord space channels to Discord-shaped channel
        objects. Channel visibility uses normal OpenCord bot-user permission
        checks.
      security:
        - botAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Visible Discord-compatible channel objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompatChannel"
        "401":
          description: Missing or invalid bot token
        "404":
          description: Space not found for this bot
        "429":
          $ref: "#/components/responses/CompatRateLimited"
  /api/compat/discord/v10/guilds/{space_id}/roles:
    get:
      summary: List Discord-compatible guild roles
      description: >
        Maps OpenCord custom space roles to Discord-shaped role objects. The
        bot user must belong to the target space and organization.
      security:
        - botAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Discord-compatible role objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompatRole"
        "401":
          description: Missing or invalid bot token
        "404":
          description: Space not found for this bot
        "429":
          $ref: "#/components/responses/CompatRateLimited"
  /api/compat/discord/v10/channels/{channel_id}/messages:
    post:
      summary: Create a Discord-compatible channel message
      description: >
        Compatibility route for simple bot migrations. Requires
        `Authorization: Bot ocb_...`; the bot user must be a member of the
        parent space and have `SEND_MESSAGES` in the channel.
      security:
        - botAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompatMessageRequest"
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateCompatMultipartMessageRequest"
      responses:
        "200":
          description: Created Discord-compatible message object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatMessage"
        "400":
          description: Invalid message content
        "401":
          description: Missing or invalid bot token
        "403":
          description: Missing SEND_MESSAGES permission
        "404":
          description: Channel or parent space not found for this bot
        "415":
          description: Request content type is not JSON or multipart form data
        "429":
          $ref: "#/components/responses/CompatRateLimited"
    get:
      summary: List Discord-compatible channel messages
      security:
        - botAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Discord-compatible message objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompatMessage"
        "401":
          description: Missing or invalid bot token
        "403":
          description: Missing VIEW_CHANNEL permission
        "404":
          description: Channel or parent space not found for this bot
        "429":
          $ref: "#/components/responses/CompatRateLimited"
  /api/compat/discord/v10/channels/{channel_id}/messages/{message_id}:
    patch:
      summary: Edit a Discord-compatible channel message
      security:
        - botAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: message_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchCompatMessageRequest"
      responses:
        "200":
          description: Updated Discord-compatible message object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatMessage"
        "400":
          description: Invalid message content
        "401":
          description: Missing or invalid bot token
        "403":
          description: Missing SEND_MESSAGES or MANAGE_MESSAGES permission
        "404":
          description: Channel, message, or parent space not found for this bot
        "429":
          $ref: "#/components/responses/CompatRateLimited"
    delete:
      summary: Delete a Discord-compatible channel message
      security:
        - botAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: message_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Message deleted
        "401":
          description: Missing or invalid bot token
        "403":
          description: Missing SEND_MESSAGES or MANAGE_MESSAGES permission
        "404":
          description: Channel, message, or parent space not found for this bot
        "429":
          $ref: "#/components/responses/CompatRateLimited"
  /api/compat/discord/v10/applications/{application_id}/guilds/{space_id}/commands:
    post:
      summary: Register a Discord-compatible space command
      description: >
        Creates a space-scoped chat input command for the authenticated bot
        application. Requires `Authorization: Bot ocb_...`; the bot user must
        be a member of the target space.
      security:
        - botAuth: []
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompatApplicationCommandRequest"
      responses:
        "201":
          description: Created Discord-compatible application command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatApplicationCommand"
        "400":
          description: Invalid command name, description, type, or options
        "401":
          description: Missing or invalid bot token
        "404":
          description: Application or target space not found for this bot
        "429":
          $ref: "#/components/responses/CompatRateLimited"
  /api/compat/discord/v10/interactions/{interaction_id}/{interaction_token}/callback:
    post:
      summary: Respond to a Discord-compatible interaction
      description: >
        Accepts callback type `4` for a bot-authored channel message response
        or callback type `5` to defer the response. The interaction token is a
        shown-once `oci_` token generated when the interaction is created and
        delivered through the compatibility gateway.
      parameters:
        - name: interaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: interaction_token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInteractionCallbackRequest"
      responses:
        "204":
          description: Interaction response accepted and message created
        "400":
          description: Unsupported callback type or invalid message data
        "401":
          description: Missing or invalid interaction token
        "404":
          description: Interaction, command, or channel not found
        "409":
          description: Interaction has already been responded to
  /api/compat/discord/v10/webhooks/{application_id}/{interaction_token}:
    post:
      summary: Create a follow-up message for a deferred interaction
      description: >
        Creates the first bot-authored follow-up message for an interaction that
        was previously acknowledged with callback type `5`. This first subset
        accepts one follow-up per deferred interaction token.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: interaction_token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInteractionFollowupRequest"
      responses:
        "200":
          description: Follow-up message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatMessage"
        "400":
          description: Invalid follow-up payload
        "401":
          description: Missing or invalid interaction token
        "404":
          description: Interaction application or channel not found
        "409":
          description: Interaction is not deferred or has already received its first follow-up
  /api/compat/discord/v10/webhooks/{application_id}/{interaction_token}/messages/@original:
    patch:
      summary: Edit the original interaction response
      description: >
        Edits the stored original bot-authored response message for an
        interaction token. The original response is created by callback type `4`
        or by the first follow-up after callback type `5`.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: interaction_token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchInteractionOriginalResponseRequest"
      responses:
        "200":
          description: Original response message edited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatMessage"
        "400":
          description: Invalid edit payload
        "401":
          description: Missing or invalid interaction token
        "404":
          description: Original interaction response was not found
    delete:
      summary: Delete the original interaction response
      description: >
        Soft-deletes the stored original bot-authored response message for an
        interaction token. Repeating the delete after the message is gone
        returns `404`.
      parameters:
        - name: application_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: interaction_token
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Original response message deleted
        "401":
          description: Missing or invalid interaction token
        "404":
          description: Original interaction response was not found
  /api/compat/discord/gateway:
    get:
      summary: Discord-compatible gateway websocket
      description: >
        Upgrades to a WebSocket, sends HELLO, accepts IDENTIFY with an
        OpenCord `ocb_` bot token, emits READY with bot-visible spaces as
        guilds, persists RESUME session records and replay events for DB-backed
        deployments with a 24-hour session TTL, acknowledges heartbeats, and dispatches
        CHANNEL_CREATE, CHANNEL_UPDATE,
        CHANNEL_DELETE, GUILD_CREATE, GUILD_UPDATE, GUILD_DELETE,
        GUILD_MEMBER_ADD, GUILD_MEMBER_REMOVE, MESSAGE_CREATE, MESSAGE_UPDATE,
        MESSAGE_DELETE, and INTERACTION_CREATE events visible to the bot user.
        Message create, update, and delete dispatches require the Discord
        `GUILD_MESSAGES` intent.
        Channel create/update/delete and guild create/update/delete dispatches
        require `GUILDS`; guild-member add/remove dispatches require
        `GUILD_MEMBERS`.
        RESUME with a sequence behind the server replays stored dispatches with
        larger sequence numbers before emitting `RESUMED`.
        Unknown opcodes close with `4001`; malformed payloads close with
        `4002`; invalid IDENTIFY tokens close with `4004`; duplicate IDENTIFY
        or RESUME-after-authenticated frames close with `4005`; RESUME frames
        with a sequence ahead of the server close with `4007`; connections
        that exceed 5 client frames per second close with `4008`; parallel
        IDENTIFY attempts for the same bot application are locally limited to
        1 per 5 seconds and close with `4008`; unknown RESUME sessions close
        with `4009`; invalid IDENTIFY shard tuples close with `4010`;
        unsupported IDENTIFY intent bits close with `4013`; known but
        disallowed IDENTIFY intent bits close with `4014` after OP 9.
      responses:
        "101":
          description: WebSocket protocol switch
        "400":
          description: WebSocket upgrade failed
  /auth/register:
    post:
      summary: Register a user and create a bearer session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already registered
        "403":
          description: SSO required for this email domain
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
        "403":
          description: SSO required for this email domain
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/oidc/providers:
    get:
      summary: List OIDC providers matching an email domain
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: Matching OIDC providers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OidcProvidersResponse"
        "400":
          description: Invalid email
  /auth/oidc/callback:
    post:
      summary: Complete OIDC login with a validated provider assertion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OidcCallbackRequest"
      responses:
        "200":
          description: Authenticated user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid provider assertion
  /auth/logout:
    post:
      summary: Revoke the current bearer session
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          description: Missing or invalid bearer session
  /me:
    get:
      summary: Return the current bearer session user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid bearer session
  /cloud/tenants:
    post:
      summary: Provision a cloud tenant organization
      description: >
        Creates the organization and owner membership atomically while setting
        plan, deployment mode, and primary region for cloud control-plane use.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionTenantRequest"
      responses:
        "201":
          description: Provisioned cloud tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantProvisionResponse"
        "400":
          description: Invalid tenant name, plan, deployment mode, or region
        "401":
          description: Missing or invalid bearer session
        "409":
          description: Organization slug already exists
  /billing/provider-events:
    post:
      summary: Apply a billing provider event to local entitlement state
      description: >
        Stores local billing subscription state and updates the organization's
        local plan entitlement without querying the billing provider on future
        requests.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingProviderEventRequest"
      responses:
        "200":
          description: Updated local billing state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStateResourceResponse"
        "400":
          description: Invalid billing provider event
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found
  /calendar/accounts:
    get:
      summary: List connected calendar accounts for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connected calendar accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarAccountListResponse"
        "401":
          description: Missing or invalid bearer session
  /calendar/accounts/caldav:
    post:
      summary: Connect or update the current user's CalDAV calendar account
      description: >
        Stores write-only CalDAV password material for future provider calls and
        returns redacted account metadata.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectCaldavCalendarRequest"
      responses:
        "201":
          description: Connected CalDAV calendar account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarAccountResourceResponse"
        "400":
          description: Invalid CalDAV account payload
        "401":
          description: Missing or invalid bearer session
  /calendar/accounts/google:
    post:
      summary: Connect or update the current user's Google Calendar account
      description: >
        Stores write-only Google token material for future provider calls and
        returns redacted account metadata.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectGoogleCalendarRequest"
      responses:
        "201":
          description: Connected Google Calendar account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarAccountResourceResponse"
        "400":
          description: Invalid Google account payload
        "401":
          description: Missing or invalid bearer session
  /calendar/accounts/microsoft:
    post:
      summary: Connect or update the current user's Microsoft Calendar account
      description: >
        Stores write-only Microsoft token material for future provider calls and
        returns redacted account metadata.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectMicrosoftCalendarRequest"
      responses:
        "201":
          description: Connected Microsoft Calendar account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarAccountResourceResponse"
        "400":
          description: Invalid Microsoft account payload
        "401":
          description: Missing or invalid bearer session
  /media/rooms/token:
    post:
      summary: Issue a short-lived LiveKit room token
      description: >
        Authenticates the user, verifies channel membership and media
        permissions, and returns a room-scoped participant token. The token is
        never broad enough to join arbitrary rooms.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMediaRoomTokenRequest"
      responses:
        "201":
          description: LiveKit connection details and participant token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRoomTokenResourceResponse"
        "400":
          description: Invalid room type, IDs, or grant request
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing VIEW_CHANNEL, CONNECT_VOICE, or requested publish permission
        "404":
          description: Channel or parent space not found for this user
  /voice/channels/{channel_id}/join:
    post:
      summary: Join a voice channel
      description: >
        Authenticates the user, verifies voice channel visibility and
        CONNECT_VOICE permission, issues a short-lived LiveKit participant token,
        and publishes a redacted `voice.participant_joined` realtime event.
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinVoiceChannelRequest"
      responses:
        "201":
          description: Voice participant state and LiveKit connection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceJoinResponse"
        "400":
          description: Channel is not a voice channel or request is invalid
        "401":
