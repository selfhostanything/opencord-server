openapi: 3.1.0
info:
  title: OpenCord Server API
  version: 0.0.0-dev
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Server is healthy
  /metrics:
    get:
      summary: Prometheus metrics
      description: >
        Exposes process-local Prometheus text metrics. Phase 03 media metrics
        include voice join successes, voice join failures by reason, and
        process-known voice participant counts by channel.
      responses:
        "200":
          description: Prometheus text exposition
          content:
            text/plain:
              schema:
                type: string
  /ws:
    get:
      summary: WebSocket realtime gateway
      description: >
        Upgrades to a WebSocket connection. Browser clients may pass the bearer
        session token as a `token` query parameter. The gateway emits realtime
        event envelopes such as `message.created`, `typing.started`, and
        `typing.stopped`.
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
      responses:
        "101":
          description: WebSocket protocol switch
        "401":
          description: Missing or invalid bearer session
  /join/{join_slug}:
    get:
      summary: Resolve a stable meeting join URL
      security:
        - bearerAuth: []
      parameters:
        - name: join_slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Meeting resolved from the join URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Meeting not found for this user
  /.well-known/opencord:
    get:
      summary: OpenCord server discovery metadata
      responses:
        "200":
          description: Discovery metadata
  /api/version:
    get:
      summary: Server version
      responses:
        "200":
          description: Version metadata
  /api/capabilities:
    get:
      summary: Server capabilities
      responses:
        "200":
          description: Capability list
  /auth/register:
    post:
      summary: Register a user and create a bearer session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already registered
  /auth/login:
    post:
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated user and session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
  /auth/logout:
    post:
      summary: Revoke the current bearer session
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session revoked
        "401":
          description: Missing or invalid bearer session
  /me:
    get:
      summary: Return the current bearer session user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid bearer session
  /cloud/tenants:
    post:
      summary: Provision a cloud tenant organization
      description: >
        Creates the organization and owner membership atomically while setting
        plan, deployment mode, and primary region for cloud control-plane use.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionTenantRequest"
      responses:
        "201":
          description: Provisioned cloud tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantProvisionResponse"
        "400":
          description: Invalid tenant name, plan, deployment mode, or region
        "401":
          description: Missing or invalid bearer session
        "409":
          description: Organization slug already exists
  /billing/provider-events:
    post:
      summary: Apply a billing provider event to local entitlement state
      description: >
        Stores local billing subscription state and updates the organization's
        local plan entitlement without querying the billing provider on future
        requests.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingProviderEventRequest"
      responses:
        "200":
          description: Updated local billing state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStateResourceResponse"
        "400":
          description: Invalid billing provider event
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found
  /calendar/accounts:
    get:
      summary: List connected calendar accounts for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connected calendar accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarAccountListResponse"
        "401":
          description: Missing or invalid bearer session
  /calendar/accounts/caldav:
    post:
      summary: Connect or update the current user's CalDAV calendar account
      description: >
        Stores write-only CalDAV password material for future provider calls and
        returns redacted account metadata.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectCaldavCalendarRequest"
      responses:
        "201":
          description: Connected CalDAV calendar account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarAccountResourceResponse"
        "400":
          description: Invalid CalDAV account payload
        "401":
          description: Missing or invalid bearer session
  /calendar/accounts/google:
    post:
      summary: Connect or update the current user's Google Calendar account
      description: >
        Stores write-only Google token material for future provider calls and
        returns redacted account metadata.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectGoogleCalendarRequest"
      responses:
        "201":
          description: Connected Google Calendar account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarAccountResourceResponse"
        "400":
          description: Invalid Google account payload
        "401":
          description: Missing or invalid bearer session
  /calendar/accounts/microsoft:
    post:
      summary: Connect or update the current user's Microsoft Calendar account
      description: >
        Stores write-only Microsoft token material for future provider calls and
        returns redacted account metadata.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectMicrosoftCalendarRequest"
      responses:
        "201":
          description: Connected Microsoft Calendar account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarAccountResourceResponse"
        "400":
          description: Invalid Microsoft account payload
        "401":
          description: Missing or invalid bearer session
  /media/rooms/token:
    post:
      summary: Issue a short-lived LiveKit room token
      description: >
        Authenticates the user, verifies channel membership and media
        permissions, and returns a room-scoped participant token. The token is
        never broad enough to join arbitrary rooms.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMediaRoomTokenRequest"
      responses:
        "201":
          description: LiveKit connection details and participant token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaRoomTokenResourceResponse"
        "400":
          description: Invalid room type, IDs, or grant request
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing VIEW_CHANNEL, CONNECT_VOICE, or requested publish permission
        "404":
          description: Channel or parent space not found for this user
  /voice/channels/{channel_id}/join:
    post:
      summary: Join a voice channel
      description: >
        Authenticates the user, verifies voice channel visibility and
        CONNECT_VOICE permission, issues a short-lived LiveKit participant token,
        and publishes a redacted `voice.participant_joined` realtime event.
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinVoiceChannelRequest"
      responses:
        "201":
          description: Voice participant state and LiveKit connection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceJoinResponse"
        "400":
          description: Channel is not a voice channel or request is invalid
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing VIEW_CHANNEL or CONNECT_VOICE permission
        "404":
          description: Channel or parent space not found for this user
  /push-tokens:
    post:
      summary: Register or update a device push token
      description: >
        Registers a push notification token for the current user. The response
        intentionally returns only the token suffix; the raw provider token is
        stored for future delivery providers and is never echoed to clients.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPushTokenRequest"
      responses:
        "201":
          description: Registered or updated push token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushTokenResourceResponse"
        "400":
          description: Invalid platform, token, or device name
        "401":
          description: Missing or invalid bearer session
    get:
      summary: List push tokens for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registered push tokens for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushTokenListResponse"
        "401":
          description: Missing or invalid bearer session
  /organizations:
    post:
      summary: Create an organization owned by the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Created organization and owner membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "409":
          description: Organization slug already exists
    get:
      summary: List organizations for the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizations visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationListResponse"
        "401":
          description: Missing or invalid bearer session
  /organizations/{organization_id}:
    get:
      summary: Return one organization for the current user
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Organization and membership role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
  /organizations/{organization_id}/usage:
    get:
      summary: Return usage counters for one organization
      description: >
        Exposes billing/admin counters derived from local stores for the current
        organization: active users, stored attachment bytes, and connected
        calendar accounts.
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Usage counters for the organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
  /organizations/{organization_id}/custom-domains:
    post:
      summary: Create a custom domain mapping for an organization
      description: >
        Creates a pending custom domain mapping and returns a verification token.
        The hostname is normalized to lowercase without a trailing dot.
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomDomainRequest"
      responses:
        "201":
          description: Created custom domain mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomDomainResponse"
        "400":
          description: Invalid hostname
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
        "409":
          description: Hostname already belongs to a custom domain mapping
    get:
      summary: List custom domains for an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Custom domains for the organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomDomainListResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
  /organizations/{organization_id}/custom-domains/{custom_domain_id}/verify:
    post:
      summary: Verify and activate a custom domain mapping
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: custom_domain_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCustomDomainRequest"
      responses:
        "200":
          description: Activated custom domain mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomDomainResponse"
        "400":
          description: Invalid verification token
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization or custom domain not found
  /custom-domains/resolve:
    get:
      summary: Resolve the request Host header to an active tenant
      description: >
        Public routing endpoint used by ingress and cloud routing checks. Only
        active custom domains resolve.
      parameters:
        - name: Host
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant metadata for the active custom domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomDomainResolveResponse"
        "400":
          description: Missing or invalid Host header
        "404":
          description: No active tenant found for this host
  /organizations/{organization_id}/spaces:
    post:
      summary: Create a space inside an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpaceRequest"
      responses:
        "201":
          description: Created space and owner membership
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpaceMembershipResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
        "409":
          description: Space slug already exists in this organization
    get:
      summary: List spaces for the current user inside an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Spaces visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpaceListResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
  /organizations/{organization_id}/meetings:
    post:
      summary: Create a scheduled meeting inside an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeetingRequest"
      responses:
        "201":
          description: Created meeting with attendees and reminders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingResourceResponse"
        "400":
          description: Invalid schedule, attendee, reminder, or meeting context
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing channel visibility for the meeting context
        "404":
          description: Organization or meeting context not found for this user
    get:
      summary: List meetings visible to the current user inside an organization
      security:
        - bearerAuth: []
      parameters:
        - name: organization_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Visible meetings for the organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingListResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Organization not found for this user
  /meetings/{meeting_id}:
    get:
      summary: Return one meeting visible to the current user
      security:
        - bearerAuth: []
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Meeting with attendees and reminders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Meeting not found for this user
    patch:
      summary: Update a scheduled meeting
      security:
        - bearerAuth: []
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMeetingRequest"
      responses:
        "200":
          description: Updated meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingResourceResponse"
        "400":
          description: Invalid meeting patch
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Current user cannot manage this meeting
        "404":
          description: Meeting not found for this user
    delete:
      summary: Cancel a scheduled meeting
      security:
        - bearerAuth: []
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cancelled meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Current user cannot manage this meeting
        "404":
          description: Meeting not found for this user
  /meetings/{meeting_id}/invite.ics:
    get:
      summary: Download an ICS calendar invite for one visible meeting
      security:
        - bearerAuth: []
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Calendar invite file for the meeting
          content:
            text/calendar:
              schema:
                type: string
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Meeting not found for this user
  /meetings/{meeting_id}/calendar/google/sync:
    post:
      summary: Create or update a Google Calendar event for one meeting
      description: >
        Requires a connected Google calendar account and meeting management
        access. The operation is idempotent for the current user, meeting, and
        provider account.
      security:
        - bearerAuth: []
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Provider calendar event sync metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEventResourceResponse"
        "400":
          description: Google Calendar account is not connected
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Current user cannot manage this meeting
        "404":
          description: Meeting not found for this user
  /meetings/{meeting_id}/calendar/caldav/sync:
    post:
      summary: Create or update a CalDAV calendar event for one meeting
      description: >
        Requires a connected CalDAV calendar account and meeting management
        access. The operation is idempotent for the current user, meeting, and
        provider account.
      security:
        - bearerAuth: []
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Provider calendar event sync metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEventResourceResponse"
        "400":
          description: CalDAV calendar account is not connected
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Current user cannot manage this meeting
        "404":
          description: Meeting not found for this user
  /meetings/{meeting_id}/calendar/microsoft/sync:
    post:
      summary: Create or update a Microsoft Calendar event for one meeting
      description: >
        Requires a connected Microsoft calendar account and meeting management
        access. The operation is idempotent for the current user, meeting, and
        provider account.
      security:
        - bearerAuth: []
      parameters:
        - name: meeting_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Provider calendar event sync metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEventResourceResponse"
        "400":
          description: Microsoft Calendar account is not connected
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Current user cannot manage this meeting
        "404":
          description: Meeting not found for this user
  /spaces/{space_id}/channels:
    post:
      summary: Create a text or voice channel inside a space
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "201":
          description: Created channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_CHANNELS permission
        "404":
          description: Space not found for this user
        "409":
          description: Channel slug already exists in this space
    get:
      summary: List channels inside a space
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Channels visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelListResponse"
        "401":
          description: Missing or invalid bearer session
        "404":
          description: Space not found for this user
  /spaces/{space_id}/members:
    post:
      summary: Add a registered user to a space
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSpaceMemberRequest"
      responses:
        "201":
          description: Added or reactivated space member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpaceMemberResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing INVITE_MEMBERS permission
        "404":
          description: Space not found for this user
  /spaces/{space_id}/roles:
    post:
      summary: Create a space role
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Created role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_ROLES permission
        "404":
          description: Space not found for this user
        "409":
          description: Role name already exists in this space
  /spaces/{space_id}/roles/{role_id}/assignments:
    post:
      summary: Assign a space role to a member
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "201":
          description: Assigned role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleAssignmentResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_ROLES permission
        "404":
          description: Space, target member, or role not found
  /spaces/{space_id}/audit-events:
    get:
      summary: List space audit events
      description: >
        Returns admin-visible audit events for moderation and compliance
        actions inside a space. Requires MANAGE_SPACE.
      security:
        - bearerAuth: []
      parameters:
        - name: space_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Space audit events ordered by creation time
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_SPACE permission
        "404":
          description: Space not found for this user
  /channels/{channel_id}:
    patch:
      summary: Update a text channel
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchChannelRequest"
      responses:
        "200":
          description: Updated channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_CHANNELS permission
        "404":
          description: Channel or parent space not found for this user
        "409":
          description: Channel slug already exists in this space
  /channels/{channel_id}/permission-overrides:
    post:
      summary: Set a member or role permission override for a channel
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetChannelPermissionOverrideRequest"
      responses:
        "200":
          description: Upserted channel permission override
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelPermissionOverrideResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing MANAGE_CHANNELS permission
        "404":
          description: Channel or parent space not found for this user
  /channels/{channel_id}/messages:
    post:
      summary: Send a message to a channel
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "201":
          description: Created message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing SEND_MESSAGES permission
        "404":
          description: Channel or parent space not found for this user
    get:
      summary: List messages in a channel
      security:
        - bearerAuth: []
      parameters:
        - name: channel_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Messages visible to the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageListResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing VIEW_CHANNEL permission
        "404":
          description: Channel or parent space not found for this user
  /attachments/presign:
    post:
      summary: Create a pending attachment and return an upload URL
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignAttachmentRequest"
      responses:
        "201":
          description: Pending attachment and upload directive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentPresignResponse"
        "400":
          description: Invalid attachment metadata
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing SEND_MESSAGES permission
        "404":
          description: Channel or parent space not found for this user
  /attachments/{attachment_id}/content:
    put:
      summary: Upload attachment bytes for a pending attachment
      security:
        - bearerAuth: []
      parameters:
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Uploaded attachment metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentResourceResponse"
        "400":
          description: Upload body does not match the pending attachment
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing SEND_MESSAGES permission
        "404":
          description: Attachment or parent channel not found for this user
    get:
      summary: Download attachment bytes
      security:
        - bearerAuth: []
      parameters:
        - name: attachment_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attachment content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing VIEW_CHANNEL permission
        "404":
          description: Attachment or parent channel not found for this user
  /messages/{message_id}:
    patch:
      summary: Edit one of the current user's messages
      security:
        - bearerAuth: []
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMessageRequest"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResourceResponse"
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing SEND_MESSAGES or MANAGE_MESSAGES permission
        "404":
          description: Message or parent channel not found for this user
    delete:
      summary: Soft-delete one of the current user's messages
      security:
        - bearerAuth: []
      parameters:
        - name: message_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Message soft-deleted
        "401":
          description: Missing or invalid bearer session
        "403":
          description: Missing SEND_MESSAGES or MANAGE_MESSAGES permission
        "404":
          description: Message or parent channel not found for this user
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - display_name
        - password
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          minLength: 1
          maxLength: 80
        password:
          type: string
          minLength: 12
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      required:
        - id
        - email
        - display_name
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
    Session:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    AuthResponse:
      type: object
      required:
        - user
        - session
      properties:
        user:
          $ref: "#/components/schemas/User"
        session:
          $ref: "#/components/schemas/Session"
    MeResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"
    RegisterPushTokenRequest:
      type: object
      required:
        - platform
        - token
      properties:
        platform:
          type: string
          enum:
            - ios
            - android
            - web
            - desktop
        token:
          type: string
          minLength: 8
          maxLength: 4096
        device_name:
          type: string
          maxLength: 120
    PushToken:
      type: object
      required:
        - id
        - user_id
        - platform
        - token_last_four
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        platform:
          type: string
          enum:
            - ios
            - android
            - web
            - desktop
        token_last_four:
          type: string
        device_name:
          type:
            - string
            - "null"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PushTokenResourceResponse:
      type: object
      required:
        - push_token
      properties:
        push_token:
          $ref: "#/components/schemas/PushToken"
    PushTokenListResponse:
      type: object
      required:
        - push_tokens
      properties:
        push_tokens:
          type: array
          items:
            $ref: "#/components/schemas/PushToken"
    CreateMediaRoomTokenRequest:
      type: object
      required:
        - room_type
        - organization_id
        - space_id
        - channel_id
      properties:
        room_type:
          type: string
          enum:
            - voice_channel
        organization_id:
          type: string
          format: uuid
        space_id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        can_publish_audio:
          type: boolean
          default: false
        can_publish_video:
          type: boolean
          default: false
        can_publish_screen:
          type: boolean
          default: false
        can_subscribe:
          type: boolean
          default: true
    MediaTokenGrants:
      type: object
      required:
        - can_publish_audio
        - can_publish_video
        - can_publish_screen
        - can_subscribe
      properties:
        can_publish_audio:
          type: boolean
        can_publish_video:
          type: boolean
        can_publish_screen:
          type: boolean
        can_subscribe:
          type: boolean
    MediaRoomToken:
      type: object
      required:
        - provider
        - server_url
        - region
        - room_type
        - room_name
        - organization_id
        - space_id
        - channel_id
        - participant_identity
        - participant_token
        - expires_at
        - grants
      properties:
        provider:
          type: string
          enum:
            - livekit
        server_url:
          type: string
        region:
          type: string
        room_type:
          type: string
          enum:
            - voice_channel
        room_name:
          type: string
        organization_id:
          type: string
          format: uuid
        space_id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        participant_identity:
          type: string
        participant_token:
          type: string
        expires_at:
          type: string
          format: date-time
        grants:
          $ref: "#/components/schemas/MediaTokenGrants"
    MediaRoomTokenResourceResponse:
      type: object
      required:
        - media
      properties:
        media:
          $ref: "#/components/schemas/MediaRoomToken"
    JoinVoiceChannelRequest:
      type: object
      properties:
        self_mute:
          type: boolean
          default: false
        self_deaf:
          type: boolean
          default: false
    VoiceParticipant:
      type: object
      required:
        - channel_id
        - user_id
        - self_mute
        - self_deaf
      properties:
        channel_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        self_mute:
          type: boolean
        self_deaf:
          type: boolean
    VoiceJoinResponse:
      type: object
      required:
        - voice
        - media
      properties:
        voice:
          $ref: "#/components/schemas/VoiceParticipant"
        media:
          $ref: "#/components/schemas/MediaRoomToken"
    CreateOrganizationRequest:
      type: object
      required:
        - name
      properties:
        kind:
          type: string
          enum:
            - text
            - voice
          default: text
        name:
          type: string
          minLength: 2
          maxLength: 100
    ProvisionTenantRequest:
      type: object
      required:
        - name
        - plan
        - deployment_mode
        - primary_region
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        plan:
          type: string
          enum:
            - free
            - team
            - business
            - enterprise
        deployment_mode:
          type: string
          enum:
            - self_hosted
            - cloud
        primary_region:
          type: string
          minLength: 2
          maxLength: 64
    Organization:
      type: object
      required:
        - id
        - slug
        - name
        - role
        - plan
        - deployment_mode
        - primary_region
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - guest
        plan:
          type: string
          enum:
            - free
            - team
            - business
            - enterprise
        deployment_mode:
          type: string
          enum:
            - self_hosted
            - cloud
        primary_region:
          type: string
    Tenant:
      type: object
      required:
        - organization_id
        - owner_user_id
        - slug
        - name
        - plan
        - deployment_mode
        - primary_region
      properties:
        organization_id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        plan:
          type: string
          enum:
            - free
            - team
            - business
            - enterprise
        deployment_mode:
          type: string
          enum:
            - self_hosted
            - cloud
        primary_region:
          type: string
    TenantProvisionResponse:
      type: object
      required:
        - tenant
      properties:
        tenant:
          $ref: "#/components/schemas/Tenant"
    CreateCustomDomainRequest:
      type: object
