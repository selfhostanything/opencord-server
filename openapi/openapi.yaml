components:
  responses:
    RateLimited:
      description: First-party API bucket is exhausted.
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        X-RateLimit-Bucket:
          schema:
            type: string
        Retry-After:
          schema:
            type: integer
          description: Seconds until retry is allowed.
      content:
        application/json:
          schema:
            type: object
            required:
              - error
            properties:
              error:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                    enum:
                      - rate_limited
                  message:
                    type: string
                    example: rate limit exceeded
    CompatRateLimited:
      description: Compatibility REST bot bucket is exhausted.
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
        X-RateLimit-Bucket:
          schema:
            type: string
        Retry-After:
          schema:
            type: integer
          description: Seconds until retry is allowed.
      content:
        application/json:
          schema:
            type: object
            required:
              - message
              - code
            properties:
              message:
                type: string
                example: rate limit exceeded
              code:
                type: integer
                example: 42900
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    botAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "Use `Authorization: Bot ocb_...`."
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - display_name
        - password
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          minLength: 1
          maxLength: 80
        password:
          type: string
          minLength: 12
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    User:
      type: object
      required:
        - id
        - email
        - display_name
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
    Session:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    AuthResponse:
      type: object
      required:
        - user
        - session
      properties:
        user:
          $ref: "#/components/schemas/User"
        session:
          $ref: "#/components/schemas/Session"
    ConfigureOidcProviderRequest:
      type: object
      required:
        - issuer
        - authorization_endpoint
        - token_endpoint
        - jwks_uri
        - client_id
        - client_secret
        - allowed_domains
        - require_sso
        - auto_join_role
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
