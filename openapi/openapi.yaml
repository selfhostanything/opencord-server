            - subscription.created
            - subscription.updated
            - subscription.cancelled
            - invoice.payment_failed
            - invoice.paid
            - plan.changed
        external_customer_id:
          type: string
          maxLength: 256
        external_subscription_id:
          type: string
          maxLength: 256
        plan:
          type: string
          enum:
            - free
            - team
            - business
            - enterprise
        status:
          type: string
          enum:
            - active
            - trialing
            - past_due
            - cancelled
            - unpaid
        current_period_end:
          type:
            - string
            - "null"
          format: date-time
    BillingState:
      type: object
      required:
        - id
        - organization_id
        - provider
        - event_type
        - external_customer_id
        - external_subscription_id
        - plan
        - status
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        provider:
          type: string
          enum:
            - stripe
        event_type:
          type: string
        external_customer_id:
          type: string
        external_subscription_id:
          type: string
        plan:
          type: string
          enum:
            - free
            - team
            - business
            - enterprise
        status:
          type: string
          enum:
            - active
            - trialing
            - past_due
            - cancelled
            - unpaid
        current_period_end:
          type:
            - string
            - "null"
          format: date-time
        updated_at:
          type: string
          format: date-time
    BillingStateResourceResponse:
      type: object
      required:
        - billing
      properties:
        billing:
          $ref: "#/components/schemas/BillingState"
    Membership:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - owner
            - admin
            - member
            - guest
    OrganizationMembershipResponse:
      type: object
      required:
        - organization
        - membership
      properties:
        organization:
          $ref: "#/components/schemas/Organization"
        membership:
          $ref: "#/components/schemas/Membership"
    OrganizationListResponse:
      type: object
      required:
        - organizations
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/Organization"
    UsageSummary:
      type: object
      required:
        - organization_id
        - active_users
        - stored_file_bytes
        - calendar_connected_accounts
      properties:
        organization_id:
          type: string
          format: uuid
        active_users:
          type: integer
          minimum: 0
        stored_file_bytes:
          type: integer
          minimum: 0
        calendar_connected_accounts:
          type: integer
          minimum: 0
    UsageResourceResponse:
      type: object
      required:
        - usage
      properties:
        usage:
          $ref: "#/components/schemas/UsageSummary"
    CreateMeetingRequest:
      type: object
      required:
        - title
        - starts_at
        - ends_at
      properties:
        space_id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type:
            - string
            - "null"
          maxLength: 4000
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        timezone:
          type: string
          default: UTC
        attendees:
          type: array
          items:
            $ref: "#/components/schemas/CreateMeetingAttendee"
        reminders:
          type: array
          items:
            $ref: "#/components/schemas/CreateMeetingReminder"
    PatchMeetingRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type:
            - string
            - "null"
          maxLength: 4000
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        timezone:
          type: string
    CreateMeetingAttendee:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum:
            - host
            - required
            - optional
    CreateMeetingReminder:
