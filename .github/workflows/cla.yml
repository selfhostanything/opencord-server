name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, synchronize, closed]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Assistant
    runs-on: ubuntu-24.04
    steps:
      - name: Check CLA signature
        if: >-
          github.event_name == 'pull_request_target' || (
            github.event_name == 'issue_comment' &&
            github.event.issue.pull_request != null &&
            (
              github.event.comment.body == 'recheck' ||
              github.event.comment.body == 'I have read the OpenCord Contributor License Agreement and I hereby sign the CLA'
            )
          )
        # contributor-assistant/github-action v2.6.1
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/v1/cla.json
          path-to-document: https://github.com/selfhostanything/opencord-server/blob/main/CLA.md
          branch: main
          allowlist: dependabot[bot],github-actions[bot],renovate[bot],mergify[bot]
          custom-pr-sign-comment: I have read the OpenCord Contributor License Agreement and I hereby sign the CLA
          custom-notsigned-prcomment: >
            Thank you for contributing to OpenCord Server. Before this PR can be
            merged, each human contributor must sign the OpenCord Server
            Contributor License Agreement: $pathToCLADocument

            To sign, reply with: I have read the OpenCord Contributor License
            Agreement and I hereby sign the CLA
          custom-allsigned-prcomment: All required contributors have signed the OpenCord Server CLA.
          lock-pullrequest-aftermerge: false
