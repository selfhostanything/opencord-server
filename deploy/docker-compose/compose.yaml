services:
  timescaledb:
    image: timescale/timescaledb:2.28.0-pg18
    environment:
      POSTGRES_DB: opencord
      POSTGRES_USER: opencord
      POSTGRES_PASSWORD: opencord
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencord -d opencord"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opencord
      MINIO_ROOT_PASSWORD: opencord-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.26
    environment:
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  livekit:
    profiles: ["media"]
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  api:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: api
    environment:
      OPENCORD_PUBLIC_URL: http://localhost:8080
      OPENCORD_ALLOWED_ORIGINS: http://localhost:5173
      DATABASE_URL: postgres://opencord:opencord@timescaledb:5432/opencord?sslmode=disable
      VALKEY_URL: redis://valkey:6379/0
      S3_ENDPOINT: http://minio:9000
      SEARCH_URL: http://meilisearch:7700
      SMTP_URL: smtp://mailpit:1025
      OPENCORD_LIVEKIT_URL: ws://livekit:7880
      OPENCORD_LIVEKIT_API_KEY: devkey
      OPENCORD_LIVEKIT_API_SECRET: secret
      OPENCORD_MEDIA_REGION: local
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      valkey:
        condition: service_started

  realtime:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: realtime
    ports:
      - "8081:8081"
    depends_on:
      valkey:
        condition: service_started

  worker:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: worker
    environment:
      DATABASE_URL: postgres://opencord:opencord@timescaledb:5432/opencord?sslmode=disable
      VALKEY_URL: redis://valkey:6379/0
    ports:
      - "8082:8082"
    depends_on:
      timescaledb:
        condition: service_healthy
      valkey:
        condition: service_started

volumes:
  timescaledb-pg18-data:
  minio-data:
  meilisearch-data:
