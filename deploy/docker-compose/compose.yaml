services:
  timescaledb:
    image: timescale/timescaledb:2.28.1-pg18-oss
    environment:
      POSTGRES_DB: opencord
      POSTGRES_USER: opencord
      POSTGRES_PASSWORD: opencord
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-pg18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencord -d opencord"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8.1-alpine
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:4.3.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 30

  scylladb:
    image: scylladb/scylla:2026.1
    command: --smp 1 --memory 750M --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9042:9042"
    volumes:
      - scylladb-data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 40

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opencord
      MINIO_ROOT_PASSWORD: opencord-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.48
    environment:
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch-data:/meili_data

  mailpit:
    image: axllent/mailpit:v1.30
    ports:
      - "1025:1025"
      - "8025:8025"

  livekit:
    profiles: ["media"]
    image: livekit/livekit-server:v1.13
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  api:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: api
    environment:
      OPENCORD_PUBLIC_URL: http://localhost:8080
      OPENCORD_ALLOWED_ORIGINS: http://localhost:5173
      DATABASE_URL: postgres://opencord:opencord@timescaledb:5432/opencord?sslmode=disable
      VALKEY_URL: redis://valkey:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCYLLA_CONTACT_POINTS: scylladb:9042
      S3_ENDPOINT: http://minio:9000
      SEARCH_URL: http://meilisearch:7700
      SMTP_URL: smtp://mailpit:1025
      OPENCORD_LIVEKIT_URL: ws://livekit:7880
      OPENCORD_LIVEKIT_API_KEY: devkey
      OPENCORD_LIVEKIT_API_SECRET: secret
      OPENCORD_MEDIA_REGION: local
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      valkey:
        condition: service_started
      kafka:
        condition: service_healthy
      scylladb:
        condition: service_healthy

  realtime:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: realtime
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCYLLA_CONTACT_POINTS: scylladb:9042
    ports:
      - "8081:8081"
    depends_on:
      valkey:
        condition: service_started
      kafka:
        condition: service_healthy
      scylladb:
        condition: service_healthy

  worker:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: worker
    environment:
      DATABASE_URL: postgres://opencord:opencord@timescaledb:5432/opencord?sslmode=disable
      VALKEY_URL: redis://valkey:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCYLLA_CONTACT_POINTS: scylladb:9042
    ports:
      - "8082:8082"
    depends_on:
      timescaledb:
        condition: service_healthy
      valkey:
        condition: service_started
      kafka:
        condition: service_healthy
      scylladb:
        condition: service_healthy

volumes:
  timescaledb-pg18-data:
  kafka-data:
  scylladb-data:
  minio-data:
  meilisearch-data:
